<!DOCTYPE html>
<html lang="en">
<!--
  ==========================================================================
  DESIGN.W2.2 — first-login onboarding deck · mockup v0.1
  --------------------------------------------------------------------------
  Scope: the SIX card bodies inside the LOCKED W2.1 deck shell.
    - Shell (overlay / modal / dprog / stepper / Back+Next) = reused verbatim
      from DESIGN_W2_1_first-login-journey_mockup-v0_1.html. NOT redrawn.
    - Card anatomy (image slot + eyebrow + title + subtext) = the W2.2 work.
    - Sequence + headers = founder-defined:
        1 Welcome + Identity   2 The Goal   3 No stake, no voice
        4 Soulbound reputation 5 Single-side binding   6 Support / Counter
    - Depth-1: provisional copy now; FINAL persuasive wording + real artwork
      deferred to the branding wave. Card-2 Goal sentence is a provisional
      draft, editable.
    - Card 1 image = the live PFP avatar (placeholder here). Cards 2-6 image =
      a bundled static illustration; the DUMMY INFOGRAPHICS below are stand-ins.
    - Side binding (locked invariant): YES / Support = black · NO / Counter = white.
    - Monochrome; brand deferred. v1.0 tokens. Desktop.

  THROWAWAY REFERENCE — not repo code, not the Claude Design deliverable.
  All names / numbers = dummy. Infographics = placeholders for real art.
  ==========================================================================
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DESIGN.W2.2 — onboarding deck v0.1</title>
<style>
  :root{
    --n0:#FFFFFF; --n1:#F5F5F5; --n2:#E5E5E5; --n3:#D4D4D4;
    --n4:#A3A3A3; --n5:#737373; --n6:#404040; --n7:#171717;
    --ink:#0A0A0A;
    --r:8px; --imgr:6px;
    --hairline:1px solid var(--n2);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:var(--sans);-webkit-font-smoothing:antialiased;color:var(--ink);}
  .page{height:100%;overflow-y:auto;background:var(--n1);padding:0 0 64px;}

  /* ---------- dev legend ---------- */
  .legend{max-width:1000px;margin:18px auto 4px;padding:11px 24px;display:flex;flex-wrap:wrap;
          gap:9px 14px;align-items:center;font-size:11px;color:var(--n5);}
  .legend b{color:var(--ink);font-weight:800;}
  .legend .pill{border:var(--hairline);border-radius:999px;padding:3px 10px;background:var(--n0);font-weight:700;}
  .legend .reset{margin-left:auto;font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--ink);
          background:var(--n0);color:var(--ink);border-radius:999px;padding:6px 13px;cursor:pointer;}
  .legend .reset:hover{background:var(--ink);color:var(--n0);}

  /* ---------- section heads ---------- */
  .shead{font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--n5);
         max-width:1000px;margin:30px auto 14px;padding:0 24px;}

  /* ==================================================================
     OVERLAY + MODAL — reused verbatim from the locked W2.1 shell
     ================================================================== */
  .stage{max-width:1000px;margin:0 auto;padding:0 24px;}
  .stage-inner{background:rgba(10,10,10,.55);border-radius:14px;padding:52px 20px;
               display:flex;justify-content:center;}
  .modal{width:432px;max-width:calc(100vw - 88px);background:var(--n0);
         border:1px solid var(--ink);border-radius:var(--r);
         box-shadow:0 24px 60px rgba(10,10,10,.28);padding:30px;position:relative;}

  /* progress (locked) */
  .dprog{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .dots{display:flex;gap:6px;}
  .dot-i{width:7px;height:7px;border-radius:50%;border:1px solid var(--ink);background:var(--n0);}
  .dot-i.on{background:var(--ink);}
  .dstep{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.1em;
         text-transform:uppercase;color:var(--n5);}

  /* card body (W2.2 anatomy — centered, Polymarket-style image + text) */
  .card{min-height:218px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .cfig{width:100%;height:140px;background:var(--n1);border:var(--hairline);border-radius:var(--imgr);
        display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .cfig svg{height:110px;width:auto;max-width:88%;display:block;}
  .idhero{width:84px;height:84px;border-radius:var(--imgr);border:1.5px solid var(--ink);
          background:var(--n1);display:flex;align-items:center;justify-content:center;
          overflow:hidden;margin-bottom:18px;}
  .ckind{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
         color:var(--n4);margin-bottom:10px;}
  .ctitle2{font-size:21px;font-weight:800;line-height:1.18;letter-spacing:-.012em;margin-bottom:12px;}
  .csub{font-size:13px;line-height:1.58;color:var(--n5);font-weight:500;max-width:332px;}
  .cfig svg text,.idhero svg text{font-family:var(--sans);}

  /* nav (locked) */
  .dnav{margin-top:24px;display:flex;align-items:center;gap:12px;}
  .dnext{flex:1 1 auto;text-align:center;background:var(--ink);color:var(--n0);
         border:1px solid var(--ink);border-radius:var(--r);padding:13px;font-size:14px;
         font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.01em;}
  .dnext:hover{background:var(--n7);border-color:var(--n7);}
  .dnext:active{background:var(--n6);}
  .dnext:focus-visible{outline:2px solid var(--ink);outline-offset:3px;}
  .dback{flex:0 0 auto;background:none;border:none;font-family:inherit;font-size:13px;
         font-weight:600;color:var(--n5);cursor:pointer;padding:0 4px;}
  .dback:hover{color:var(--ink);}
  .dback:disabled{color:var(--n3);cursor:default;}
  .dback:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:3px;}

  /* ==================================================================
     OVERVIEW GRID — all six at a glance (review + screenshot for CD)
     ================================================================== */
  .ovgrid{max-width:1000px;margin:0 auto;padding:0 24px;display:grid;
          grid-template-columns:repeat(3,1fr);gap:18px;}
  .ovcard{background:var(--n0);border:1px solid var(--ink);border-radius:var(--r);
          padding:20px 20px 24px;display:flex;flex-direction:column;align-items:center;
          text-align:center;position:relative;}
  .ovstep{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--n4);
          align-self:flex-start;margin-bottom:14px;text-transform:uppercase;}
  @media (max-width:880px){ .ovgrid{grid-template-columns:1fr;} }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
<div class="page">

  <div class="legend">
    <span><b>MOCKUP</b> · DESIGN.W2.2 onboarding deck v0.1</span>
    <span class="pill">monochrome · brand deferred</span>
    <span class="pill">copy = provisional</span>
    <span class="pill">infographics = dummy</span>
    <span class="pill">not skippable on first login</span>
    <button class="reset" onclick="resetDeck()">↺ reset to step 1</button>
  </div>

  <h2 class="shead">Interactive deck — Back / Next (or ← →), steps 1 → 6</h2>
  <div class="stage">
    <div class="stage-inner">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Welcome to Zugzwang">
        <div class="dprog">
          <div class="dots" id="dots"></div>
          <div class="dstep" id="dstep">Step 1 of 6</div>
        </div>
        <div class="card" id="card"></div>
        <div class="dnav">
          <button class="dback" id="dback" onclick="prevCard()">Back</button>
          <button class="dnext" id="dnext" onclick="nextCard()">Next</button>
        </div>
      </div>
    </div>
  </div>

  <h2 class="shead">All six cards</h2>
  <div class="ovgrid" id="ovgrid"></div>

</div>

<script>
  /* ---------- dummy infographics (placeholders for real art) ---------- */
  var AVATAR =
    '<svg viewBox="0 0 84 84" aria-hidden="true">' +
      '<circle cx="42" cy="31" r="14" fill="var(--n3)"/>' +
      '<path d="M18 73c2-15 12-23 24-23s22 8 24 23" fill="none" stroke="var(--n3)" stroke-width="11" stroke-linecap="round"/>' +
    '</svg>';

  var FIG = {
    /* card 2 — The Goal: a balance tipped so K·n outweighs C */
    goal:
      '<svg viewBox="0 0 220 120" aria-hidden="true">' +
        '<line x1="110" y1="100" x2="110" y2="40" stroke="var(--ink)" stroke-width="2"/>' +
        '<polygon points="100,108 120,108 110,98" fill="var(--ink)"/>' +
        '<line x1="48" y1="58" x2="172" y2="36" stroke="var(--ink)" stroke-width="2"/>' +
        '<circle cx="110" cy="47" r="3" fill="var(--ink)"/>' +
        '<line x1="48" y1="58" x2="48" y2="72" stroke="var(--n5)" stroke-width="1.5"/>' +
        '<g fill="var(--ink)">' +
          '<circle cx="38" cy="78" r="4"/><circle cx="48" cy="78" r="4"/><circle cx="58" cy="78" r="4"/>' +
          '<circle cx="43" cy="87" r="4"/><circle cx="53" cy="87" r="4"/>' +
          '<circle cx="38" cy="96" r="4"/><circle cx="48" cy="96" r="4"/>' +
        '</g>' +
        '<text x="48" y="116" text-anchor="middle" font-size="11" font-weight="800" fill="var(--n6)">K · n</text>' +
        '<line x1="172" y1="36" x2="172" y2="50" stroke="var(--n5)" stroke-width="1.5"/>' +
        '<circle cx="172" cy="63" r="13" fill="none" stroke="var(--n4)" stroke-width="2"/>' +
        '<text x="172" y="68" text-anchor="middle" font-size="13" font-weight="800" fill="var(--n5)">C</text>' +
        '<text x="172" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="var(--n5)">capital</text>' +
      '</svg>',
    /* card 3 — No stake, no voice: a voice (speech bubble) that carries a stake (Đ) */
    voice:
      '<svg viewBox="0 0 220 120" aria-hidden="true">' +
        '<rect x="66" y="24" width="88" height="54" rx="14" fill="var(--n0)" stroke="var(--ink)" stroke-width="2"/>' +
        '<polygon points="86,74 86,96 104,76" fill="var(--n0)"/>' +
        '<line x1="86" y1="78" x2="86" y2="95" stroke="var(--ink)" stroke-width="2"/>' +
        '<line x1="88" y1="94" x2="103" y2="78" stroke="var(--ink)" stroke-width="2"/>' +
        '<text x="110" y="60" text-anchor="middle" font-size="27" font-weight="800" fill="var(--ink)">Đ</text>' +
      '</svg>',
    /* card 4 — Soulbound: your Đ cannot move to another account */
    soulbound:
      '<svg viewBox="0 0 220 120" aria-hidden="true">' +
        '<circle cx="60" cy="58" r="22" fill="var(--n0)" stroke="var(--ink)" stroke-width="2"/>' +
        '<text x="60" y="66" text-anchor="middle" font-size="22" font-weight="800" fill="var(--ink)">Đ</text>' +
        '<line x1="90" y1="58" x2="146" y2="58" stroke="var(--n4)" stroke-width="2"/>' +
        '<polygon points="146,52 158,58 146,64" fill="var(--n4)"/>' +
        '<circle cx="176" cy="58" r="13" fill="none" stroke="var(--n4)" stroke-width="2" stroke-dasharray="3 3"/>' +
        '<g stroke="var(--ink)" stroke-width="3.5" stroke-linecap="round">' +
          '<line x1="110" y1="44" x2="128" y2="72"/>' +
          '<line x1="128" y1="44" x2="110" y2="72"/>' +
        '</g>' +
      '</svg>',
    /* card 5 — Single-side binding: pick one side (YES black / NO white), it locks */
    side:
      '<svg viewBox="0 0 220 120" aria-hidden="true">' +
        '<rect x="40" y="56" width="70" height="26" fill="var(--ink)"/>' +
        '<rect x="110" y="56" width="70" height="26" fill="var(--n0)"/>' +
        '<rect x="40" y="56" width="140" height="26" fill="none" stroke="var(--ink)" stroke-width="2"/>' +
        '<line x1="110" y1="56" x2="110" y2="82" stroke="var(--ink)" stroke-width="2"/>' +
        '<text x="75" y="74" text-anchor="middle" font-size="11" font-weight="800" fill="var(--n0)">YES</text>' +
        '<text x="145" y="74" text-anchor="middle" font-size="11" font-weight="800" fill="var(--ink)">NO</text>' +
        '<g transform="translate(67,26)">' +
          '<rect x="0" y="9" width="16" height="12" rx="2" fill="var(--ink)"/>' +
          '<path d="M3 9 V6 a5 5 0 0 1 10 0 V9" fill="none" stroke="var(--ink)" stroke-width="2"/>' +
        '</g>' +
      '</svg>',
    /* card 6 — Support / Counter: a reply is a bet (Support black / Counter white) */
    reply:
      '<svg viewBox="0 0 220 120" aria-hidden="true">' +
        '<rect x="74" y="12" width="72" height="30" rx="6" fill="var(--n0)" stroke="var(--ink)" stroke-width="2"/>' +
        '<line x1="84" y1="23" x2="136" y2="23" stroke="var(--n3)" stroke-width="3"/>' +
        '<line x1="84" y1="31" x2="120" y2="31" stroke="var(--n3)" stroke-width="3"/>' +
        '<line x1="96" y1="42" x2="74" y2="72" stroke="var(--n4)" stroke-width="1.5"/>' +
        '<line x1="124" y1="42" x2="146" y2="72" stroke="var(--n4)" stroke-width="1.5"/>' +
        '<rect x="34" y="74" width="78" height="26" rx="13" fill="var(--ink)"/>' +
        '<text x="73" y="91" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--n0)">SUPPORT</text>' +
        '<rect x="114" y="74" width="78" height="26" rx="13" fill="var(--n0)" stroke="var(--ink)" stroke-width="2"/>' +
        '<text x="153" y="91" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--ink)">COUNTER</text>' +
      '</svg>'
  };

  /* ---------- card definitions (founder sequence; provisional copy) ---------- */
  var CARDS = [
    { identity:true, eyebrow:"WELCOME", title:"You’re umber-falcon-31",
      sub:"This pseudonym is how you’ll be known here — for the length of the experiment. You start with Đ 1,000, and earn about 10 Đ a day when you post." },
    { fig:"goal", eyebrow:"THE GOAL", title:"Knowledge, at scale, beats capital.",
      sub:"Know more (K), bring informed people together (n), and the crowd that understands the truth can outweigh the money (C) betting on a false outcome. That’s the whole bet: K · n > C." },
    { fig:"voice", eyebrow:"THE RULES", title:"No stake, no voice",
      sub:"Every argument here is a bet. To post or reply, you back your view with Dharma — so every voice in the debate has real skin in the game. Speaking is staking." },
    { fig:"soulbound", eyebrow:"THE RULES", title:"Soulbound reputation",
      sub:"Your Dharma is your reputation, and it’s yours alone. It can’t be bought, sold, gifted, or moved to another account. You earn it by being right — there’s no shortcut." },
    { fig:"side", eyebrow:"THE RULES", title:"Single-side binding",
      sub:"You can hold a position on only one side of a market at a time, and your side locks to your words the moment you post. To switch, sell your whole position first, then re-enter — you can’t argue both sides at once." },
    { fig:"reply", eyebrow:"THE RULES", title:"Support / Counter",
      sub:"Replying is betting, too. Reply with Support to stake on a post’s side, or Counter to back the other side. Every reply is an argument with Dharma behind it — that’s how the debate moves." }
  ];

  /* ---------- shared inner render (used by modal + overview) ---------- */
  function figHTML(c){
    return c.identity
      ? '<div class="idhero">' + AVATAR + '</div>'
      : '<div class="cfig">' + FIG[c.fig] + '</div>';
  }
  function cardInner(c){
    return figHTML(c) +
      '<div class="ckind">' + c.eyebrow + '</div>' +
      '<div class="ctitle2">' + c.title + '</div>' +
      '<div class="csub">' + c.sub + '</div>';
  }

  /* ---------- interactive modal ---------- */
  var idx = 0, N = CARDS.length;
  function renderModal(){
    var dots = '';
    for(var i=0;i<N;i++) dots += '<span class="dot-i' + (i<=idx?' on':'') + '"></span>';
    document.getElementById('dots').innerHTML = dots;
    document.getElementById('dstep').textContent = 'Step ' + (idx+1) + ' of ' + N;
    document.getElementById('card').innerHTML = cardInner(CARDS[idx]);
    document.getElementById('dback').disabled = (idx === 0);
    document.getElementById('dnext').textContent = (idx === N-1) ? 'Enter Zugzwang' : 'Next';
  }
  function nextCard(){ if(idx < N-1){ idx++; renderModal(); } }
  function prevCard(){ if(idx > 0){ idx--; renderModal(); } }
  function resetDeck(){ idx = 0; renderModal(); window.scrollTo({top:0,behavior:'smooth'}); }

  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight'){ nextCard(); }
    else if(e.key === 'ArrowLeft'){ prevCard(); }
  });

  /* ---------- overview grid ---------- */
  function buildOverview(){
    document.getElementById('ovgrid').innerHTML = CARDS.map(function(c, i){
      return '<div class="ovcard">' +
        '<div class="ovstep">Step ' + (i+1) + ' of ' + N + '</div>' +
        cardInner(c) +
      '</div>';
    }).join('');
  }

  renderModal();
  buildOverview();
</script>
</body>
</html>
